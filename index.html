<!DOCTYPE html>
<html>
<head>
    <title>Website Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        h1 {
            font-size: 4em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5em;
            opacity: 0.9;
        }
        .box {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 Website Saya</h1>
        <p>Berhasil Deploy di SmarterASP.NET!</p>
        <p>👋 Hello World!</p>
    </div>
</body>
</html>
